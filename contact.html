<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Exact Crop</title>
<meta name="description" content="Get in touch with the developer of Exact Crop, Azubuike Christian Obiora.">
<link rel="canonical" href="https://azubuike75.github.io/Mythbborrn-photo-editor-and-crop/contact.html">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<meta name="theme-color" content="#1b1b18">
<style>
  :root{ --ink:#1b1b18; --paper:#f4f2ec; --panel:#ffffff; --line:#d8d5c9; --accent:#c1440e; --accent-ink:#fff7f0;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:var(--sans); background:var(--paper); color:var(--ink); min-height:100vh; padding:32px 16px 0; display:flex; flex-direction:column;}
  .wrap{max-width:720px; margin:0 auto; width:100%; flex:1;}
  .kicker{font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin:0 0 6px;}
  h1{font-size:26px; margin:0 0 20px; font-weight:600; letter-spacing:-.01em;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:2px; padding:24px; font-size:14px; line-height:1.7; color:#3f3d36;}
  .panel p{margin:0 0 14px;}
  .mail-btn{
    display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:14px;
    text-transform:uppercase; letter-spacing:.04em; background:var(--accent); color:var(--accent-ink);
    padding:12px 22px; border-radius:2px; text-decoration:none; font-weight:600; margin-top:6px;
  }
  .mail-btn:hover{background:#a83a0c;}
  a{color:var(--accent);}
  .back{display:inline-block; margin-bottom:20px; font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#5c5a51; text-decoration:none;}
  .back:hover{color:var(--accent);}
  footer{border-top:1px solid var(--line); margin-top:40px; padding:24px 16px 28px;}
  .footer-wrap{max-width:720px; margin:0 auto; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px;}
  .footer-links{display:flex; flex-wrap:wrap; gap:16px;}
  .footer-links a{font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#5c5a51; text-decoration:none;}
  .footer-links a:hover{color:var(--accent);}
  .footer-credit{font-size:12px; color:#8a8779; text-align:right;}
  .footer-credit a{color:#8a8779; text-decoration:underline;}
  .footer-credit a:hover{color:var(--accent);}
  @media (max-width:520px){ .footer-wrap{flex-direction:column; align-items:flex-start;} .footer-credit{text-align:left;} }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="./index.html">&larr; Back to Exact Crop</a>
  <p class="kicker">contact</p>
  <h1>Get in touch</h1>
  <div class="panel">
    <p>Found a bug, have a feature request, or just want to say hello? Reach out directly by email.</p>
    <p><a class="mail-btn" href="mailto:obioraazubuike78@gmail.com">Email obioraazubuike78@gmail.com</a></p>
  </div>
</div>
<footer>
  <div class="footer-wrap">
    <nav class="footer-links" aria-label="Footer">
      <a href="./about.html">About</a>
      <a href="./terms.html">Terms</a>
      <a href="./privacy.html">Privacy</a>
      <a href="./contact.html">Contact</a>
    </nav>
    <p class="footer-credit">Developed by Azubuike Christian Obiora — <a href="mailto:obioraazubuike78@gmail.com">obioraazubuike78@gmail.com</a></p>
  </div>
</footer>
</body>
</html>
